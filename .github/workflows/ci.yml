name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main, "Louis'-modification", "Louis-modification"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-train.txt   # Phase-2 pipeline test deps

      - name: Run tests
        run: pytest -q

      - name: Build Docker image
        run: docker build -t bixi-demand-api .

      - name: Smoke test Docker container
        run: |
          docker run -d \
            --name bixi-demand-api-ci \
            -p 8000:8000 \
            -e MODEL_SOURCE=local \
            bixi-demand-api

          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health; then
              exit 0
            fi
            sleep 2
          done

          docker logs bixi-demand-api-ci
          exit 1

      - name: Clean up Docker container
        if: always()
        run: docker rm -f bixi-demand-api-ci || true
